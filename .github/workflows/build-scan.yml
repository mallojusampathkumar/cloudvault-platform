name: Build & Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-scan:
    name: Build & Scan ${{ matrix.service }}
    runs-on: ubuntu-latest
    # Matrix: run this job once per service, in parallel
    strategy:
      fail-fast: false   # Don't cancel other services if one fails
      matrix:
        service:
          - user-service
          - product-service
          - cart-service
          - order-service
          - payment-service
          - notification-service
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push yet)
        uses: docker/build-push-action@v5
        with:
          context: ./services/${{ matrix.service }}
          push: false
          load: true    # Load into local docker so Trivy can scan it
          tags: cloudvault/${{ matrix.service }}:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: cloudvault/${{ matrix.service }}:scan
          format: table
          severity: CRITICAL,HIGH
          exit-code: '0'   # Report but don't fail (set to 1 to enforce)
          ignore-unfixed: true

      - name: Trivy scan summary
        run: echo "✓ ${{ matrix.service }} scanned"

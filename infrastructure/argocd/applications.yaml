# ============================================
# ArgoCD Applications for CloudVault
# Each app watches the Helm chart in Git and 
# auto-syncs to the cluster.
# ============================================
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: user-service
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/mallojusampathkumar/cloudvault-platform.git
    targetRevision: main
    path: infrastructure/helm-charts/cloudvault-service
    helm:
      valueFiles:
        - ../values/user-service.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: cloudvault
  syncPolicy:
    automated:
      prune: true       # Delete resources not in Git
      selfHeal: true    # Revert manual cluster changes
    syncOptions:
      - CreateNamespace=true

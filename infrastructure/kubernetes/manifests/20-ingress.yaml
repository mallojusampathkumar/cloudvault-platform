# ============================================
# CloudVault Ingress -> ALB -> NGINX gateway
# All /api/* traffic goes to NGINX, which strips
# the prefix and routes to the right service.
# ============================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cloudvault-ingress
  namespace: cloudvault
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
    alb.ingress.kubernetes.io/group.name: cloudvault
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          # Everything goes to NGINX gateway
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nginx-gateway
                port:
                  number: 80
